name: Deploy Jekyll site to Pages

# Build with our own Jekyll 4.3 (matches local dev) instead of GitHub's classic
# Jekyll 3.x "Deploy from a branch" builder. On Jekyll 3.x, output:false collection
# docs are still rendered through their layout and broke the build; Jekyll 4.3 does
# not render them, so we pin it here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true          # runs bundle install + caches gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true             # switch the Pages source to GitHub Actions
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
